=========================== */
        async function imageToBase64(url) {

            try {

                const response = await fetch(url);

                const blob = await response.blob();

                return await new Promise(resolve => {

                    const reader = new FileReader();

                    reader.onloadend = () => {
                        resolve(reader.result);
                    };

                    reader.readAsDataURL(blob);

                });

            } catch (error) {

                console.error(error);

                return null;

            }
        }

        /* ===========================
             現在地取得
          =========================== */

        function getCurrentLocation() {
            alert("GPS取得中です");
            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const lat = position.coords.latitude;

                    const lng = position.coords.longitude;

                    map.setView([lat, lng], 15);

                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                    }

                    currentMarker = L.marker(
                        [lat, lng],
                        {
                            draggable: true,
                            icon: redIcon
                        }
                    )
                        .addTo(map)
                        .bindPopup("現在地")
                        .openPopup();

                    currentMarker.on("dragend", function (e) {

                        const pos = e.target.getLatLng();

                        currentMarker.setPopupContent(
                            `現在地<br>
        緯度:${pos.lat.toFixed(6)}<br>
        経度:${pos.lng.toFixed(6)}`
                        );

                    });
                },

                function (error) {
                    alert("GPS取得失敗 : " + error.message);
                },

                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }
        function getDistanceMeters(lat1, lng1, lat2, lng2) {

            const R = 6371000;

            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) *
                Math.sin(dLng / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }
        async function startTracking() {

            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }

            // ==========================
            // 前回保存地点を取得
            // ==========================

            const {
                data: { session }
            } = await supabaseClient.auth.getSession();

            if (session) {

                const { data: lastLog } =
                    await supabaseClient
                        .from("travel_logs")
                        .select("latitude, longitude")
                        .eq("user_id", session.user.id)
                        .order("created_at", {
                            ascending: false
                        })
                        .limit(1)
                        .single();

                if (lastLog) {

                    lastSavedLat = lastLog.latitude;
                    lastSavedLng = lastLog.longitude;

                    console.log(
                        "前回地点読込",
                        lastSavedLat,
                        lastSavedLng
                    );
                }
            }

            watchId = navigator.geolocation.watchPosition(

                async (position) => {

                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if (!currentMarker) {

                        currentMarker = L.marker(
                            [lat, lng],
                            {
                                icon: redIcon
                            }
                        )
                            .addTo(map)
                            .bindPopup("現在地");

                    } else {

                        currentMarker.setLatLng([
                            lat,
                            lng
                        ]);

                    }

                    if (map) {

                        map.panTo([
                            lat,
                            lng
                        ]);

                    }
                    console.log(
                        "GPS受信",
                        new Date().toLocaleTimeString(),
                        lat,
                        lng,
                        "精度=" + position.coords.accuracy
                    );
                    if (position.coords.accuracy > 200) {

                        console.log(
                            "GPS精度悪いため無視",
                            position.coords.accuracy
                        );

                        return;
                    }

                    console.log("追跡:", lat, lng);

                    if (
                        lastSavedLat === null ||
                        lastSavedLng === null
                    ) {

                        lastSavedLat = lat;
                        lastSavedLng = lng;

                        await autoSaveLocation(lat, lng);

                        addMarker(
                            lat,
                            lng,
                            "自動記録",
                            null
                        );

                        console.log("初回保存");

                        return;
                    }

                    const distance = getDistance(
                        lastSavedLat,
                        lastSavedLng,
                        lat,
                        lng
                    );

                    console.log(
                        "移動距離:",
                        Math.round(distance),
                        "m"
                    );

                    if (distance >= 10) {

                        // 保存中は無視
                        if (isSaving) {
                            return;
                        }

                        // 10秒以内の連続保存防止
                        if (
                            Date.now() - lastSaveTime
                            < 10000
                        ) {
                            return;
                        }

                        isSaving = true;

                        try {

                            await autoSaveLocation(
                                lat,
                                lng
                            );

                            lastSaveTime = Date.now();

                            addMarker(
                                lat,
                                lng,
                                "自動記録",
                                null
                            );

                            lastSavedLat = lat;
                            lastSavedLng = lng;

                        } finally {

                            isSaving = false;

                        }

                        console.log(
                            Math.round(distance) +
                            "m移動したので自動記録しました"
                        );
                    }

                },

                (error) => {
                    console.error(error);
                },

                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }
        /* ===========================
   画像圧縮
=========================== */
        async function compressImage(file) {

            return new Promise((resolve) => {

                const reader = new FileReader();

                reader.onload = (event) => {

                    const img = new Image();

                    img.onload = () => {

                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");

                        let width = img.width;
                        let height = img.height;

                        const maxSize = 800;

                        // 長辺を1600pxに縮小
                        if (width > height) {

                            if (width > maxSize) {
                                height = height * (maxSize / width);
                                width = maxSize;
                            }

                        } else {

                            if (height > maxSize) {
                                width = width * (maxSize / height);
                                height = maxSize;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;

                        ctx.drawImage(
                            img,
                            0,
                            0,
                            width,
                            height
                        );

                        canvas.toBlob(

                            (blob) => {

                                const compressedFile =
                                    new File(
                                        [blob],
                                        file.name.replace(/\.[^/.]+$/, "") + ".jpg",
                                        {
                                            type: "image/jpeg"
                                        }
                                    );

                                resolve(compressedFile);

                            },

                            "image/jpeg",

                            0.3 // 品質50%

                        );

                    };

                    img.src = event.target.result;

                };

                reader.readAsDataURL(file);

            });

        }
        function getDistance(lat1, lng1, lat2, lng2) {

            const R = 6371000;

            const dLat =
                (lat2 - lat1) * Math.PI / 180;

            const dLng =
                (lng2 - lng1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) *
                Math.sin(dLat / 2) +

                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *

                Math.sin(dLng / 2) *
                Math.sin(dLng / 2);

            const c =
                2 * Math.atan2(
                    Math.sqrt(a),
                    Math.sqrt(1 - a)
                );

            return R * c;
        }
        /* ===========================
            現在地保存
       =========================== */

        async function saveLocation() {

            try {

                const {
                    data: { session }
                } = await supabaseClient.auth.getSession();

                if (!session) {
                    alert("ログインしてください");
                    return;
                }

                // ドラッグ後のマーカー位置取得
                let lat;
                let lng;

                if (currentMarker) {

                    const pos = currentMarker.getLatLng();

                    lat = pos.lat;
                    lng = pos.lng;

                } else {

                    alert("現在地マーカーがありません");
                    return;
                }

                const memo =
                    document.getElementById("memo").value;

                let imageUrl = null;
                let fileName = null;

                const file =
                    document.getElementById("photo").files[0];

                /* ===================
                     Storage保存
                ==================== */

                if (file) {

                    const compressedFile =
                        await compressImage(file);

                    fileName =
                        Date.now() + "_" + compressedFile.name;

                    const { error: uploadError } =
                        await supabaseClient.storage
                            .from("travel-images")
                            .upload(
                                fileName,
                                compressedFile,
                                {
                                    contentType: "image/jpeg"
                                }
                            );

                    if (uploadError) {
                        alert(uploadError.message);
                        return;
                    }

                    const { data: urlData } =
                        supabaseClient.storage
                            .from("travel-images")
                            .getPublicUrl(fileName);

                    imageUrl =
                        urlData.publicUrl;
                }

                /* ===================
                     DB保存
                ==================== */

                const { error } =
                    await supabaseClient
                        .from("travel_logs")
                        .insert({
                            user_id: session.user.id,
                            latitude: lat,
                            longitude: lng,
                            memo: memo,
                            image_url: imageUrl,
                            file_name: fileName || null
                        });

                if (error) {
                    alert(error.message);
                    return;
                }

                addMarker(
                    lat,
                    lng,
                    memo,
                    imageUrl
                );

                document.getElementById("memo").value = "";
                document.getElementById("photo").value = "";

                alert("保存しました");

                // 履歴と地図だけ再読み込み
                await loadLogs();

            } catch (error) {

                alert(error.message);

            }

        }
        async function autoSaveLocation(lat, lng) {

            const {
                data: { session }
            } =
                await supabaseClient.auth.getSession();

            if (!session) return;

            await supabaseClient
                .from("travel_logs")
                .insert({
                    user_id: session.user.id,
                    latitude: lat,
                    longitude: lng,
                    memo: "自動記録"
                });

            console.log(
                "自動保存",
                lat,
                lng
            );
            console.log(
                "自動保存成功",
                lat,
                lng
            );
        }
        /* ===========================
             マーカー表示
          =========================== */

        function addMarker(lat, lng, memo, imageUrl) {
            let html = "";

            if (memo) {
                html += "<b>メモ</b><br>" + memo + "<br><br>";
            }

            if (imageUrl) {
                html += "<img src='" + imageUrl + "' style='width:200px'>";
            }

            L.circleMarker(
                [lat, lng],
                {
                    radius: 8
                }
            )
                .addTo(map)
                .bindPopup(html);

            routePoints.push([lat, lng]);
            drawRoute();
        }
        function drawRoute() {
            if (routeLine) {
                map.removeLayer(routeLine);
            }

            if (routePoints.length < 2) {
                return;
            }

            routeLine = L.polyline(routePoints, {
                weight: 5,
            }).addTo(map);
        }
        /* ===========================
             保存済み読み込み
          =========================== */

        async function loadLogs() {

            // 履歴表示を初期化
            document.getElementById("historyArea").innerHTML = "";

            // ルート情報初期化
            routePoints = [];

            if (routeLine) {
                map.removeLayer(routeLine);
                routeLine = null;
            }
            const {
                data: { session },
            } = await supabaseClient.auth.getSession();

            if (!session) {
                return;
            }

            const { data, error } = await supabaseClient
                .from("travel_logs")
                .select("*")
                .eq("user_id", session.user.id)
                .order("created_at", {
                    ascending: false, // 新しい順
                });

            if (error) {
                console.error(error);
                return;
            }

            const visibleLogs =
                data.filter(
                    log => log.memo !== "自動記録"
                );

            document.getElementById("logCount").innerHTML =
                visibleLogs.length;

            // =====================
            // 地図は全件表示
            // =====================
            console.log(
                "読み込んだ件数",
                data.length
            );
            data
                .slice(0, 500)
                .forEach((log) => {

                    addMarker(
                        log.latitude,
                        log.longitude,
                        log.memo,
                        null
                    );

                });

            // =====================
            // 履歴は手動記録のみ
            // =====================

            let historyHtml = "";

            visibleLogs
                .slice(0, 50)
                .forEach((log) => {

                    historyHtml += `
<div style="
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-top:10px;
">

    <b>
        ${new Date(log.created_at).toLocaleString()}
    </b>

    <br><br>

    ${log.memo || "メモなし"}

    <br><br>

    ${log.image_url
                            ? `
    <button
        onclick="showImage('${log.image_url}')">
        写真を見る
    </button>
`
                            : ""
                        }

    <button onclick="deleteLog(${log.id})">
        削除
    </button>

</div>
`;
                });

            document.getElementById("historyArea").innerHTML =
                historyHtml;
        }
        function showImage(url) {

            const modal = document.createElement("div");

            modal.style.position = "fixed";
            modal.style.left = "0";
            modal.style.top = "0";
            modal.style.width = "100%";
            modal.style.height = "100%";
            modal.style.background = "rgba(0,0,0,0.8)";
            modal.style.display = "flex";
            modal.style.alignItems = "center";
            modal.style.justifyContent = "center";
            modal.style.zIndex = "9999";

            modal.innerHTML = `
        <img
            src="${url}"
            style="
                max-width:95%;
                max-height:95%;
                border-radius:10px;
            ">
    `;

            modal.onclick = () => {
                document.body.removeChild(modal);
            };

            document.body.appendChild(modal);
        }
        async function deleteLog(id) {
            if (!confirm("削除しますか？")) {
                return;
            }

            const { error } = await supabaseClient
                .from("travel_logs")
                .delete()
                .eq("id", id);

            if (error) {
                alert(error.message);
                return;
            }

            alert("削除しました");

            await loadLogs();
        }

        /* ===========================
     写真プレビュー
  =========================== */

        document.getElementById("photo").addEventListener("change", function () {
            const file = this.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                const preview = document.getElementById("preview");

                preview.src = e.target.result;
                preview.style.display = "block";
            };

            reader.readAsDataURL(file);
        });
        /* ===========================
             起動
          =========================== */

        checkLogin();
    </script>
</body>

</html>
