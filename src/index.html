    <header>旅行ログアプリ</header>

    <div class="container">
      <!-- ログイン画面 -->
      <div id="authArea" class="card">
        <h2>ログイン</h2>

        <input type="email" id="email" placeholder="メールアドレス" />

        <input type="password" id="password" placeholder="パスワード" />

        <button class="primary" onclick="signUp()">新規登録</button>

        <button class="success" onclick="login()">ログイン</button>
      </div>

      <!-- アプリ画面 -->
      <div id="appArea" class="hidden">
        <div class="card">
          <div id="userInfo"></div>

          <button class="danger" onclick="logout()">ログアウト</button>
        </div>
        <div class="card">
          <h3>旅行記録</h3>

          <textarea
            id="memo"
            placeholder="メモを入力"
            style="
              width: 100%;
              height: 100px;
              padding: 10px;
              border-radius: 8px;
              border: 1px solid #ccc;
              margin-top: 10px;
            "
          ></textarea>

          <br /><br />

          <input
            type="file"
            id="photo"
            accept="image/*"
            capture="environment"
          />

          <img
            id="preview"
            style="
              width: 100%;
              max-width: 300px;
              margin-top: 10px;
              display: none;
              border-radius: 10px;
            "
          />
        </div>
        <div class="card">
          <h3>現在地マップ</h3>

          <div id="map"></div>

          <button
            class="primary"
            onclick="window.getCurrentLocation()"
            style="margin-top: 10px"
          >
            GPS再取得
          </button>
        </div>
        <button class="success" onclick="saveLocation()">現在地を記録</button>

        <button class="primary" onclick="exportAlbum()">
          思い出アルバムを書き出す
        </button>

        <button class="danger" onclick="exportAndDelete()">
          アルバム保存して全削除
        </button>

        <div class="card">
          <h3>訪問履歴 (<span id="logCount">0</span>件)</h3>

          <div id="historyArea"></div>
        </div>
      </div>
    </div>

      async function exportAlbum() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session) {
          alert("ログインしてください");
          return;
        }

        const { data, error } = await supabaseClient
          .from("travel_logs")
          .select("*")
          .eq("user_id", session.user.id)
          .order("created_at", {
            ascending: true,
          });

        if (error) {
          alert(error.message);
          return;
        }

        let html = `


      <h1>旅の思い出アルバム</h1>

      <p>
      作成日 :
      ${new Date().toLocaleString()}
      </p>
      `;

        for (const log of data) {
          let embeddedImage = "";

          if (log.image_url) {
            const base64 = await imageToBase64(log.image_url);

            if (base64) {
              embeddedImage = `<img src="${base64}">`;
            }
          }

          html += `

      <div class="card">

      <div class="date">
      ${new Date(log.created_at).toLocaleString()}
      </div>

      <br>

      <div>
      ${log.memo || "メモなし"}
      </div>

      <br>

      ${embeddedImage}

      <br><br>

      緯度:
      ${log.latitude}

      <br>

      経度:
      ${log.longitude}

      </div>

      `;
        }

        html += `
      </body>
      </html>
      `;

        try {
          const fileName =
            "travel_album_" +
            new Date().toISOString().replace(/[:.]/g, "-") +
            ".html";

          await window.Filesystem.writeFile({
            path: fileName,

            data: html,

            directory: window.Directory.Documents,

            encoding: window.Encoding.UTF8,
          });

          alert("アルバムを保存しました\n\n" + "ファイル名:\n" + fileName);
        } catch (err) {
          console.error(err);

          alert("保存失敗:\n" + err.message);
        }
      }

      async function exportAndDelete() {
        await exportAlbum();

        const ok = confirm(
          "アルバム保存後に全データを削除します。\n続行しますか？",
        );

        if (!ok) return;

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const { data, error } = await supabaseClient
          .from("travel_logs")
          .select("*")
          .eq("user_id", session.user.id);

        if (error) {
          alert(error.message);
          return;
        }

        const files = data.filter((x) => x.file_name).map((x) => x.file_name);

        if (files.length > 0) {
          const { error: storageError } = await supabaseClient.storage
            .from("travel-images")
            .remove(files);

          console.log("削除対象", files);
          console.log("Storage削除エラー", storageError);

          if (storageError) {
            alert(storageError.message);
            return;
          }
        }

        const { error: deleteError } = await supabaseClient
          .from("travel_logs")
          .delete()
          .eq("user_id", session.user.id);

        if (deleteError) {
          alert(deleteError.message);
          return;
        }

        alert("アルバム保存・写真削除・履歴削除が完了しました");

        location.reload();
      }

      function getCurrentLocation() {
        navigator.geolocation.getCurrentPosition(
          function (position) {
            const lat = position.coords.latitude;

            const lng = position.coords.longitude;

            map.setView([lat, lng], 15);

            if (currentMarker) {
              map.removeLayer(currentMarker);
            }

            currentMarker = L.marker([lat, lng], {
              draggable: false,
              icon: redIcon,
            })
              .addTo(map)
              .bindPopup("現在地")
              .openPopup();
          },

          function (error) {
            alert("GPS取得失敗 : " + error.message);
          },

          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          },
        );
